name: Deploy Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Build → Deploy → Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Vercel prebuilt deploy sequence ───────────────────────────────────────
      # vercel pull  → writes .vercel/project.json (identifies the project)
      # vercel build → runs buildCommand from vercel.json, outputs .vercel/output/
      # vercel deploy --prebuilt → uploads .vercel/output/ (no rebuild on Vercel)
      #
      # VERCEL_ORG_ID + VERCEL_PROJECT_ID are required by all three vercel CLI
      # commands to identify which project to act on. Token alone is not enough.

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (staging)
        # vercel build runs the buildCommand from vercel.json but VITE_* env vars
        # injected here take precedence over any .env files, so staging secrets
        # are used even though vercel.json's buildCommand points to build:production.
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_ENV: staging
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_PLAUSIBLE_DOMAIN: ${{ secrets.STAGING_PLAUSIBLE_DOMAIN }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Deploy to Vercel (staging preview)
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Staging deployed: ${{ steps.deploy.outputs.deployment_url }}`
            })

      # ── Lighthouse CI ─────────────────────────────────────────────────────────
      # continue-on-error so a Lighthouse regression doesn't block the deploy.
      # Fix any reported regressions separately.

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
